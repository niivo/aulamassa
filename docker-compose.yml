services:
 
  db:
    image: mariadb:10.11
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: aluno123
      MYSQL_DATABASE: nura_db
    volumes:
      - db_data:/var/lib/mysql
 
  phpmyadmin:
    image: phpmyadmin
    restart: always
    ports:
      - "8080:80"
    environment:
      PMA_HOST: db
      PMA_ARBITRARY: 1
    depends_on:
      - db
 
  web:
    build:
      context: ./
      dockerfile: Dockerfile
    ports:
      - "80:80"
    volumes:
      - ./:/var/www/html
      #- ./nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - php-fpm
 
  php-fpm:
    image: php:8.3-fpm
    container_name: fzl-php8.3-fpm
    volumes:
      - ./:/var/www/html
 
volumes:
  db_data: